<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — IA para Sócios</title>
<style>
  :root{
    --papel:#F7F8F6; --tinta:#16232A; --tinta-suave:#5B6B72;
    --marca:#0F5E68; --marca-claro:#E3EEEF;
    --certo:#1F7A4D; --certo-claro:#E6F2EB;
    --erro:#B3422E; --erro-claro:#F7E9E5;
    --borda:#D8DEDC; --raio:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--papel); color:var(--tinta);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:17px; line-height:1.5;
    min-height:100vh; display:flex; justify-content:center;
  }
  .quadro{width:100%; max-width:520px; padding:24px 20px 48px}
  .cabecalho{margin-bottom:8px}
  .modulo{font-size:13px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--marca); font-weight:600}
  h1{font-family:Georgia,"Times New Roman",serif; font-weight:600;
    font-size:26px; line-height:1.25; margin-top:4px}

  /* Assinatura: a régua de resultado se preenche ao vivo e vira a string compartilhável */
  .regua{display:flex; gap:10px; margin:20px 0 28px}
  .ponto{width:34px; height:34px; border-radius:50%; border:2px solid var(--borda);
    display:flex; align-items:center; justify-content:center;
    font-size:15px; font-weight:700; color:var(--tinta-suave);
    background:#fff; transition:all .25s ease}
  .ponto.atual{border-color:var(--marca); color:var(--marca)}
  .ponto.certo{background:var(--certo); border-color:var(--certo); color:#fff}
  .ponto.erro{background:var(--erro); border-color:var(--erro); color:#fff}

  .cartao{background:#fff; border:1px solid var(--borda); border-radius:var(--raio);
    padding:22px 20px; box-shadow:0 1px 3px rgba(22,35,42,.06)}
  .num-q{font-family:Georgia,serif; font-size:15px; color:var(--tinta-suave);
    margin-bottom:6px}
  .pergunta{font-weight:600; font-size:18px; margin-bottom:18px}
  .alternativa{display:block; width:100%; text-align:left; margin-bottom:10px;
    padding:14px 16px; border:1.5px solid var(--borda); border-radius:10px;
    background:#fff; font:inherit; color:var(--tinta); cursor:pointer;
    transition:border-color .15s, background .15s}
  .alternativa:not(:disabled):hover{border-color:var(--marca); background:var(--marca-claro)}
  .alternativa:disabled{cursor:default; opacity:.55}
  .alternativa.marcada-certa{opacity:1; border-color:var(--certo);
    background:var(--certo-claro); font-weight:600}
  .alternativa.marcada-errada{opacity:1; border-color:var(--erro);
    background:var(--erro-claro)}

  .feedback{margin-top:16px; padding:16px; border-radius:10px; font-size:15.5px;
    display:none}
  .feedback.certo{display:block; background:var(--certo-claro);
    border-left:4px solid var(--certo)}
  .feedback.erro{display:block; background:var(--erro-claro);
    border-left:4px solid var(--erro)}
  .feedback strong{display:block; margin-bottom:4px}

  .botao{display:block; width:100%; margin-top:18px; padding:15px;
    border:none; border-radius:10px; background:var(--marca); color:#fff;
    font:inherit; font-weight:600; font-size:16px; cursor:pointer}
  .botao:active{transform:translateY(1px)}
  .botao.fantasma{background:#fff; color:var(--marca);
    border:1.5px solid var(--marca)}
  .oculto{display:none}

  /* Tela final */
  .placar-final{text-align:center; padding:8px 0 4px}
  .nota{font-family:Georgia,serif; font-size:52px; font-weight:600;
    color:var(--marca)}
  .glifos{font-size:30px; letter-spacing:6px; margin:10px 0 4px}
  .mensagem-final{color:var(--tinta-suave); font-size:15.5px; margin-bottom:18px}
  .campo-nome{width:100%; padding:13px 15px; border:1.5px solid var(--borda);
    border-radius:10px; font:inherit; margin-bottom:12px}
  .campo-nome:focus{outline:2px solid var(--marca); border-color:var(--marca)}
  .aviso-copia{text-align:center; font-size:14px; color:var(--certo);
    margin-top:10px; visibility:hidden}

  @media (prefers-reduced-motion: reduce){*{transition:none !important}}
</style>
</head>
<body>
<div id="gate-quiz" style="position:fixed;inset:0;background:#F7F8F6;z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <div style="width:100%;max-width:360px;text-align:center">
    <div style="font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:#0F5E68;font-weight:600">IA para Executivos</div>
    <h2 style="font-family:Georgia,serif;font-size:24px;margin:6px 0 16px;color:#16232A">Conteúdo protegido</h2>
    <input id="gq-senha" type="password" placeholder="Senha do grupo" style="width:100%;padding:13px 15px;border:1.5px solid #D8DEDC;border-radius:10px;font-size:16px;text-align:center;margin-bottom:10px">
    <button id="gq-btn" style="width:100%;padding:14px;border:none;border-radius:10px;background:#0F5E68;color:#fff;font-size:16px;font-weight:600;cursor:pointer">Entrar</button>
    <div id="gq-erro" style="color:#B3422E;font-size:14px;margin-top:10px;min-height:18px"></div>
  </div>
</div>
<script>
(function(){var ITER=200000;
async function dk(pw,salt){var bk=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:ITER,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function chk(pw){var buf=new Uint8Array(await (await fetch("audio/verifier.enc")).arrayBuffer());var salt=buf.slice(0,16),iv=buf.slice(16,28),ct=buf.slice(28);var k=await dk(pw,salt);var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},k,ct);return new TextDecoder().decode(pt)==="etho-ok";}
var btn=document.getElementById("gq-btn"),inp=document.getElementById("gq-senha"),err=document.getElementById("gq-erro");
async function go(){err.textContent="";btn.disabled=true;btn.textContent="Verificando...";try{if(await chk(inp.value)){document.getElementById("gate-quiz").style.display="none";}else{throw 0;}}catch(e){err.textContent="Senha incorreta.";btn.disabled=false;btn.textContent="Entrar";}}
btn.onclick=go;inp.addEventListener("keydown",function(e){if(e.key==="Enter")go();});})();
</script>

<div class="quadro">
  <div class="cabecalho">
    <div class="modulo" id="rotulo-modulo"></div>
    <h1 id="titulo-quiz"></h1>
  </div>
  <div class="regua" id="regua" aria-label="Progresso do quiz"></div>

  <div class="cartao" id="cartao-questao">
    <div class="num-q" id="num-q"></div>
    <div class="pergunta" id="texto-pergunta"></div>
    <div id="alternativas"></div>
    <div class="feedback" id="feedback" role="status"></div>
    <button class="botao oculto" id="btn-proxima" onclick="proxima()">Próxima questão</button>
  </div>

  <div class="cartao oculto" id="cartao-final">
    <div class="placar-final">
      <div class="nota" id="nota-final"></div>
      <div class="glifos" id="glifos-final"></div>
      <div class="mensagem-final" id="mensagem-final"></div>
    </div>
    <input class="campo-nome" id="campo-nome" type="text"
      placeholder="Seu nome (aparece no resultado)" autocomplete="name">
    <button class="botao" onclick="compartilharWhatsApp()">Enviar resultado no WhatsApp</button>
    <button class="botao fantasma" onclick="copiarResultado()">Copiar resultado</button>
    <div class="aviso-copia" id="aviso-copia">Copiado — cole no grupo.</div>
  </div>
</div>

<script>
/* ===== QUIZ_DATA_INICIO =====
   A skill /produzir-modulo substitui APENAS o objeto QUIZ abaixo.
   Estrutura: modulo, titulo, questoes[{pergunta, alternativas[4],
   correta(indice 0-3), feedback}]. Nada mais neste arquivo muda. */
const QUIZ = {
  modulo: "Módulo 1",
  titulo: "Como chegamos aqui e o ecossistema",
  questoes: [
    {
      pergunta: "Numa reunião, alguém resume: 'no fundo, IA hoje é tudo modelo de linguagem — o resto é variação do mesmo chatbot'. Qual correção é a mais precisa?",
      alternativas: [
        "Está essencialmente certo: imagem e vídeo também saem de modelos de linguagem, só que treinados em pixels em vez de palavras",
        "Vale para o uso pessoal, mas dentro das empresas quase todo o valor de IA vem mesmo de modelos de texto",
        "Era verdade até 2022; antes disso a IA era só imagem e previsão, e o texto só veio depois",
        "Boa parte dos modelos mais usados hoje é de imagem, vídeo e áudio — e há uma IA analítica/preditiva que não gera conteúdo algum e ainda assim entrega muito valor"
      ],
      correta: 3,
      feedback: "O AI Index 2026 (Stanford HAI) mostra que muitos dos modelos mais usados são de imagem, vídeo, áudio e multimodais — não só texto. E há a divisão entre IA generativa (cria conteúdo) e IA analítica/preditiva (prevê fraude, demanda), que roda muito valor sem 'gerar' nada. Achar que 'IA = chatbot de texto' é o erro que faz entrar na conversa em desvantagem."
    },
    {
      pergunta: "Um fornecedor diz ter entregue um 'agente de IA' que 'lê cada chamado e sugere ao atendente uma resposta pronta para ele aprovar'. Pela distinção dos três degraus, o que isso é de fato?",
      alternativas: [
        "Está no degrau da IA que raciocina e assiste — lê e sugere, mas quem decide e executa ainda é a pessoa; um agente de verdade fecharia o ciclo sozinho",
        "Um agente pleno: ele já executa a tarefa de ponta a ponta, do chamado à resolução",
        "É o primeiro degrau, a IA que conversa, já que no fim ele produz um texto de resposta",
        "Não é IA de verdade: agente só conta se agir sem nenhum modelo de linguagem por baixo"
      ],
      correta: 0,
      feedback: "Os três degraus: conversar (escreve, resume), raciocinar (lê um contrato e aponta os riscos) e agentes (executa a tarefa inteira sozinho — abre o chamado, puxa dados, emite, avisa). 'Sugere para o humano aprovar' ainda é o degrau que assiste, não o que executa. 'Agente' virou palavra de marketing — saber o degrau real evita comprar promessa como se fosse operação."
    },
    {
      pergunta: "Tecnicamente, o que mudou por volta de 2022 para a IA 'sair do laboratório'? A leitura mais correta é:",
      alternativas: [
        "Inventou-se naquele ano uma tecnologia inédita, que substituiu tudo o que havia antes",
        "A IA só ficou mais barata — era a mesma capacidade de sempre, agora ao alcance de todos",
        "Uma tecnologia que já existia desde ~2017 ganhou escala: com dados e potência suficientes, a máquina passou a conversar e criar, não só classificar e prever",
        "Os sistemas passaram a guardar tudo o que o usuário digita, ganhando uma memória permanente que antes não tinham"
      ],
      correta: 2,
      feedback: "A base é de ~2017; o salto de 2022 foi de escala — dados e potência suficientes para a máquina conversar e criar, não só classificar/prever como os modelos de 10-15 anos atrás. Cuidado com a armadilha do 'só ficou mais barato': foi mudança de capacidade, não só de preço. E ela usa o que você escreve como contexto na hora — não vira memória permanente."
    },
    {
      pergunta: "Um cliente teme colar um contrato confidencial no chat: 'a IA vai aprender com isso e depois entregar para um concorrente?'. Sobre como o modelo usa o que você escreve, o módulo diz que:",
      alternativas: [
        "Sim: tudo que se digita entra no treino permanente do modelo, então nada sensível deveria ser colado, nunca",
        "Não há risco algum, porque esse tipo de modelo é analítico, e modelos analíticos não leem texto",
        "Depende do tamanho: trechos curtos são esquecidos, mas documentos longos acabam entrando no treino",
        "O modelo usa o texto como contexto na hora para responder, mas não treina nem guarda aquilo — terminado o pedido, aquele conteúdo se perde"
      ],
      correta: 3,
      feedback: "O mecanismo descrito no módulo: o modelo lê o que você escreve como contexto para responder naquele momento — não treina com aquilo nem o armazena; acabou o pedido, esqueceu. (A política de dados de cada fornecedor é outra conversa, contratual — mas o modelo em si não 'aprende e vaza'.) As outras opções confundem uso-em-contexto com treino permanente, ou inventam uma regra por tamanho de texto."
    },
    {
      pergunta: "O módulo cita um teste padronizado de programação em que, em um ano, a IA 'saiu de mediana ao nível de um engenheiro de referência'. A leitura correta é:",
      alternativas: [
        "É o ritmo de evolução num teste específico — não o trabalho todo de um engenheiro; a lição é mirar na velocidade, não na foto de hoje",
        "A IA já substitui, por inteiro, um engenheiro de software",
        "A capacidade da IA se estabilizou: chegou ao teto e parou de crescer",
        "O ganho vale só para programação; em nenhuma outra tarefa a IA avançou de um ano para o outro"
      ],
      correta: 0,
      feedback: "Dado do AI Index (Stanford). O ponto é o ritmo — num teste específico, não no trabalho inteiro de um engenheiro. Para quem decide, a lição é não avaliar IA pela foto de hoje, e sim pela velocidade da curva. Foi rápido porque entrou dinheiro em IA como nunca."
    },
    {
      pergunta: "McKinsey (State of AI 2025): 'mais de 6 em cada 10 empresas já experimentam agentes, mas menos de 10% os põem para rodar em escala'. O que esse par de números diz?",
      alternativas: [
        "Que agentes já viraram padrão de mercado e quem não usa ficou para trás",
        "Que a tecnologia falhou — se quase ninguém escala, é porque não funciona",
        "Que há muita experimentação e pouquíssima operação real: a distância entre testar e pôr em produção é onde estão o desafio e a vantagem de quem a cruza",
        "Que os 10% que escalam simplesmente gastaram mais em licenças que os demais"
      ],
      correta: 2,
      feedback: "Experimentar não é operar. Mais de 60% testam agentes, menos de 10% os têm em produção — a lacuna entre demo e produção é o tema central do curso, não um sinal de que 'não funciona' nem de que 'todo mundo já tem'. A vantagem competitiva mora exatamente em cruzar essa distância."
    },
    {
      pergunta: "Uma empresa oferece 'acesso a dezenas de modelos de vários fornecedores por uma porta só, para testar e comparar sem casar com nenhum'. Em que grupo do ecossistema ela está?",
      alternativas: [
        "Labs — afinal, ela distribui muitos modelos de fundação",
        "Agregadores / gateways — a 'porta única' para comparar modelos de fornecedores diferentes é exatamente esse papel",
        "Nuvens / hyperscalers, que também dão acesso a vários modelos nas suas plataformas",
        "Serviços e integração, já que ajuda o cliente a escolher o modelo"
      ],
      correta: 1,
      feedback: "Os cinco grupos: labs (fabricam modelos), nuvens/hyperscalers (hospedam e bancam a infraestrutura), SaaS com IA embutida, agregadores/gateways (uma porta para muitos modelos, tipo o OpenRouter) e serviços/integração. 'Comparar vários fornecedores por uma porta só' é a marca do agregador. A opção das nuvens tenta confundir, mas o hyperscaler hospeda e distribui — não existe para comparar entre concorrentes."
    },
    {
      pergunta: "McKinsey (2025): 88% das empresas já usam IA em alguma função, mas só ~6% são 'high performers'. Um sócio conclui: 'logo, os outros 82% escolheram os modelos errados'. A correção é:",
      alternativas: [
        "Está certo: os high performers usam modelos superiores; os demais precisam trocar de fornecedor",
        "O gargalo não é a escolha do modelo, e sim a abordagem — redesenhar o processo e medir resultado; usar a ferramenta é fácil, capturar valor é o raro",
        "A direção está certa, mas o número de high performers é 88%, não 6%",
        "Não dá para concluir nada: 'usar IA' e 'ser high performer' medem exatamente a mesma coisa"
      ],
      correta: 1,
      feedback: "88% usam, ~6% se destacam — o divisor não é o modelo, é a abordagem (redesenho de processo, dados, medição). Comprar ferramenta virou commodity; transformar em resultado que aparece no balanço continua raro. Trocar de fornecedor não move esse ponteiro."
    },
    {
      pergunta: "MIT (2025): iniciativas com parceiro externo chegam a operar de verdade cerca de duas vezes mais que as feitas só com equipe interna (67% vs 33%). A leitura mais cuidadosa é:",
      alternativas: [
        "Contratar um parceiro garante o dobro de retorno financeiro — é causa e efeito direto",
        "Equipe interna praticamente nunca consegue colocar IA em produção",
        "Significa que 67% de todas as empresas do mundo já têm IA em produção",
        "É uma vantagem real de operar com parceiro, mas parte vem de quem chama parceiro já chegar mais organizado; é sinal forte, não garantia mecânica"
      ],
      correta: 3,
      feedback: "O 67% vs 33% é sobre chegar a operar de verdade, não sobre retorno garantido, e a base são as iniciativas do estudo — não 'todas as empresas'. Cuidado com causa e efeito: quem contrata parceiro costuma já chegar mais organizado. É um sinal forte a favor de não fazer sozinho, mas lido com nuance."
    },
    {
      pergunta: "A Shopify (apresentada na AI Engineer World's Fair 2026) trocou um modelo caro e superdimensionado por um mais enxuto e cortou o custo daquela operação em mais de 500x, sem quebrá-la. A lição central é:",
      alternativas: [
        "Quando o valor está no sistema em volta (processos, dados, verificação), o modelo vira peça trocável: dá para trocá-lo sem refazer a operação. É o que é 'ativo' contra o que é 'aluguel'",
        "Existe um modelo 500x mais barato que os outros; a jogada é achá-lo e adotá-lo",
        "O barato sempre vence — escolha, por regra, o modelo mais econômico disponível",
        "Trocar de modelo quase sempre quebra a operação, então o certo é nunca mexer"
      ],
      correta: 0,
      feedback: "A economia veio da estrutura em volta, não de um modelo mágico: com processos, dados e verificação bem montados, o modelo é peça trocável — trocou por um mais enxuto e a operação seguiu de pé. Essa é a fronteira entre o que é seu (ativo) e o que você só aluga junto com o modelo. Não é 'sempre o mais barato' nem 'nunca mexer'."
    }
  ]
};
/* ===== QUIZ_DATA_FIM ===== */

let atual = 0;
const resultados = [];

function iniciar(){
  document.getElementById("rotulo-modulo").textContent = QUIZ.modulo;
  document.getElementById("titulo-quiz").textContent = QUIZ.titulo;
  const regua = document.getElementById("regua");
  QUIZ.questoes.forEach((_, i) => {
    const p = document.createElement("div");
    p.className = "ponto"; p.id = "ponto-" + i; p.textContent = i + 1;
    regua.appendChild(p);
  });
  mostrarQuestao();
}

function mostrarQuestao(){
  const q = QUIZ.questoes[atual];
  document.getElementById("num-q").textContent =
    "Questão " + (atual + 1) + " de " + QUIZ.questoes.length;
  document.getElementById("texto-pergunta").textContent = q.pergunta;
  document.getElementById("ponto-" + atual).classList.add("atual");
  const cx = document.getElementById("alternativas");
  cx.innerHTML = "";
  q.alternativas.forEach((alt, i) => {
    const b = document.createElement("button");
    b.className = "alternativa"; b.textContent = alt;
    b.onclick = () => responder(i, b);
    cx.appendChild(b);
  });
  const fb = document.getElementById("feedback");
  fb.className = "feedback"; fb.innerHTML = "";
  document.getElementById("btn-proxima").classList.add("oculto");
}

function responder(escolha, botao){
  const q = QUIZ.questoes[atual];
  const acertou = escolha === q.correta;
  resultados.push(acertou);
  document.querySelectorAll(".alternativa").forEach((b, i) => {
    b.disabled = true;
    if (i === q.correta) b.classList.add("marcada-certa");
    else if (i === escolha && !acertou) b.classList.add("marcada-errada");
  });
  const ponto = document.getElementById("ponto-" + atual);
  ponto.classList.remove("atual");
  ponto.classList.add(acertou ? "certo" : "erro");
  ponto.textContent = acertou ? "✓" : "✗";
  const fb = document.getElementById("feedback");
  fb.className = "feedback " + (acertou ? "certo" : "erro");
  fb.innerHTML = "<strong>" + (acertou ? "Certo." : "Não é essa.") +
    "</strong>" + q.feedback;
  const btn = document.getElementById("btn-proxima");
  btn.textContent = atual < QUIZ.questoes.length - 1
    ? "Próxima questão" : "Ver resultado";
  btn.classList.remove("oculto");
  btn.focus();
}

function proxima(){
  atual++;
  if (atual < QUIZ.questoes.length) { mostrarQuestao(); return; }
  document.getElementById("cartao-questao").classList.add("oculto");
  const acertos = resultados.filter(Boolean).length;
  document.getElementById("nota-final").textContent =
    acertos + "/" + QUIZ.questoes.length;
  document.getElementById("glifos-final").textContent = glifos();
  document.getElementById("mensagem-final").textContent =
    acertos === QUIZ.questoes.length
      ? "Gabaritou. Poste no grupo e pressione os outros."
      : "O feedback das erradas volta na reunião. Poste seu resultado no grupo.";
  document.getElementById("cartao-final").classList.remove("oculto");
}

function glifos(){
  return resultados.map(r => r ? "✅" : "❌").join(" ");
}

function textoResultado(){
  const nome = document.getElementById("campo-nome").value.trim();
  const acertos = resultados.filter(Boolean).length;
  return "📊 Quiz " + QUIZ.modulo.replace(" · EXEMPLO","") +
    (nome ? " — " + nome : "") + ": " + acertos + "/" +
    QUIZ.questoes.length + "\n" + glifos();
}

function compartilharWhatsApp(){
  window.open("https://wa.me/?text=" +
    encodeURIComponent(textoResultado()), "_blank");
}

function copiarResultado(){
  navigator.clipboard.writeText(textoResultado()).then(() => {
    document.getElementById("aviso-copia").style.visibility = "visible";
  });
}

iniciar();
</script>
</body>
</html>
