<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — IA para Sócios</title>
<style>
  :root{
    --papel:#F7F8F6; --tinta:#16232A; --tinta-suave:#5B6B72;
    --marca:#0F5E68; --marca-claro:#E3EEEF;
    --certo:#1F7A4D; --certo-claro:#E6F2EB;
    --erro:#B3422E; --erro-claro:#F7E9E5;
    --borda:#D8DEDC; --raio:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--papel); color:var(--tinta);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:17px; line-height:1.5;
    min-height:100vh; display:flex; justify-content:center;
  }
  .quadro{width:100%; max-width:520px; padding:24px 20px 48px}
  .cabecalho{margin-bottom:8px}
  .modulo{font-size:13px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--marca); font-weight:600}
  h1{font-family:Georgia,"Times New Roman",serif; font-weight:600;
    font-size:26px; line-height:1.25; margin-top:4px}

  /* Assinatura: a régua de resultado se preenche ao vivo e vira a string compartilhável */
  .regua{display:flex; gap:10px; margin:20px 0 28px}
  .ponto{width:34px; height:34px; border-radius:50%; border:2px solid var(--borda);
    display:flex; align-items:center; justify-content:center;
    font-size:15px; font-weight:700; color:var(--tinta-suave);
    background:#fff; transition:all .25s ease}
  .ponto.atual{border-color:var(--marca); color:var(--marca)}
  .ponto.certo{background:var(--certo); border-color:var(--certo); color:#fff}
  .ponto.erro{background:var(--erro); border-color:var(--erro); color:#fff}

  .cartao{background:#fff; border:1px solid var(--borda); border-radius:var(--raio);
    padding:22px 20px; box-shadow:0 1px 3px rgba(22,35,42,.06)}
  .num-q{font-family:Georgia,serif; font-size:15px; color:var(--tinta-suave);
    margin-bottom:6px}
  .pergunta{font-weight:600; font-size:18px; margin-bottom:18px}
  .alternativa{display:block; width:100%; text-align:left; margin-bottom:10px;
    padding:14px 16px; border:1.5px solid var(--borda); border-radius:10px;
    background:#fff; font:inherit; color:var(--tinta); cursor:pointer;
    transition:border-color .15s, background .15s}
  .alternativa:not(:disabled):hover{border-color:var(--marca); background:var(--marca-claro)}
  .alternativa:disabled{cursor:default; opacity:.55}
  .alternativa.marcada-certa{opacity:1; border-color:var(--certo);
    background:var(--certo-claro); font-weight:600}
  .alternativa.marcada-errada{opacity:1; border-color:var(--erro);
    background:var(--erro-claro)}

  .feedback{margin-top:16px; padding:16px; border-radius:10px; font-size:15.5px;
    display:none}
  .feedback.certo{display:block; background:var(--certo-claro);
    border-left:4px solid var(--certo)}
  .feedback.erro{display:block; background:var(--erro-claro);
    border-left:4px solid var(--erro)}
  .feedback strong{display:block; margin-bottom:4px}

  .botao{display:block; width:100%; margin-top:18px; padding:15px;
    border:none; border-radius:10px; background:var(--marca); color:#fff;
    font:inherit; font-weight:600; font-size:16px; cursor:pointer}
  .botao:active{transform:translateY(1px)}
  .botao.fantasma{background:#fff; color:var(--marca);
    border:1.5px solid var(--marca)}
  .oculto{display:none}

  /* Tela final */
  .placar-final{text-align:center; padding:8px 0 4px}
  .nota{font-family:Georgia,serif; font-size:52px; font-weight:600;
    color:var(--marca)}
  .glifos{font-size:30px; letter-spacing:6px; margin:10px 0 4px}
  .mensagem-final{color:var(--tinta-suave); font-size:15.5px; margin-bottom:18px}
  .campo-nome{width:100%; padding:13px 15px; border:1.5px solid var(--borda);
    border-radius:10px; font:inherit; margin-bottom:12px}
  .campo-nome:focus{outline:2px solid var(--marca); border-color:var(--marca)}
  .aviso-copia{text-align:center; font-size:14px; color:var(--certo);
    margin-top:10px; visibility:hidden}

  @media (prefers-reduced-motion: reduce){*{transition:none !important}}
</style>
</head>
<body>
<div id="gate-quiz" style="position:fixed;inset:0;background:#F7F8F6;z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <div style="width:100%;max-width:360px;text-align:center">
    <div style="font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:#0F5E68;font-weight:600">IA para Executivos</div>
    <h2 style="font-family:Georgia,serif;font-size:24px;margin:6px 0 16px;color:#16232A">Conteúdo protegido</h2>
    <input id="gq-senha" type="password" placeholder="Senha do grupo" style="width:100%;padding:13px 15px;border:1.5px solid #D8DEDC;border-radius:10px;font-size:16px;text-align:center;margin-bottom:10px">
    <button id="gq-btn" style="width:100%;padding:14px;border:none;border-radius:10px;background:#0F5E68;color:#fff;font-size:16px;font-weight:600;cursor:pointer">Entrar</button>
    <div id="gq-erro" style="color:#B3422E;font-size:14px;margin-top:10px;min-height:18px"></div>
  </div>
</div>
<script>
(function(){var ITER=200000;
async function dk(pw,salt){var bk=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:ITER,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function chk(pw){var buf=new Uint8Array(await (await fetch("audio/verifier.enc")).arrayBuffer());var salt=buf.slice(0,16),iv=buf.slice(16,28),ct=buf.slice(28);var k=await dk(pw,salt);var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},k,ct);return new TextDecoder().decode(pt)==="etho-ok";}
var btn=document.getElementById("gq-btn"),inp=document.getElementById("gq-senha"),err=document.getElementById("gq-erro");
async function go(){err.textContent="";btn.disabled=true;btn.textContent="Verificando...";try{if(await chk(inp.value)){document.getElementById("gate-quiz").style.display="none";}else{throw 0;}}catch(e){err.textContent="Senha incorreta.";btn.disabled=false;btn.textContent="Entrar";}}
btn.onclick=go;inp.addEventListener("keydown",function(e){if(e.key==="Enter")go();});})();
</script>

<div class="quadro">
  <div class="cabecalho">
    <div class="modulo" id="rotulo-modulo"></div>
    <h1 id="titulo-quiz"></h1>
  </div>
  <div class="regua" id="regua" aria-label="Progresso do quiz"></div>

  <div class="cartao" id="cartao-questao">
    <div class="num-q" id="num-q"></div>
    <div class="pergunta" id="texto-pergunta"></div>
    <div id="alternativas"></div>
    <div class="feedback" id="feedback" role="status"></div>
    <button class="botao oculto" id="btn-proxima" onclick="proxima()">Próxima questão</button>
  </div>

  <div class="cartao oculto" id="cartao-final">
    <div class="placar-final">
      <div class="nota" id="nota-final"></div>
      <div class="glifos" id="glifos-final"></div>
      <div class="mensagem-final" id="mensagem-final"></div>
    </div>
    <input class="campo-nome" id="campo-nome" type="text"
      placeholder="Seu nome (aparece no resultado)" autocomplete="name">
    <button class="botao" onclick="compartilharWhatsApp()">Enviar resultado no WhatsApp</button>
    <button class="botao fantasma" onclick="copiarResultado()">Copiar resultado</button>
    <div class="aviso-copia" id="aviso-copia">Copiado — cole no grupo.</div>
  </div>
</div>

<script>
/* ===== QUIZ_DATA_INICIO =====
   A skill /produzir-modulo substitui APENAS o objeto QUIZ abaixo.
   Estrutura: modulo, titulo, questoes[{pergunta, alternativas[4],
   correta(indice 0-3), feedback}]. Nada mais neste arquivo muda. */
const QUIZ = {
  modulo: "Módulo 4",
  titulo: "Da demo à produção: o que separa uma da outra",
  questoes: [
    {
      pergunta: "Por que uma demonstração de IA impressionante NÃO prova que a solução vai funcionar na operação?",
      alternativas: [
        "Porque a demo usa dados escolhidos a dedo e prova apenas que a IA lida bem com casos fáceis; no caso difícil do cliente, ela para de funcionar.",
        "Porque a sensação de que 'funciona' não é prova: num estudo, quem usou IA se sentiu mais rápido, mas a medição mostrou que ficou mais lento.",
        "Porque a demo exibe respostas roteiradas de antemão; por definição, ela nunca reflete como o produto reage a uma pergunta nova de verdade.",
        "Porque, fora do laboratório, a IA exige uma infraestrutura pesada que poucas empresas mantêm, e sem ela o modelo simplesmente trava."
      ],
      correta: 1,
      feedback: "No ensaio da METR, devs experientes sentiram ~20% de ganho e ficaram 19% mais lentos — sem perceber. A demo mostra o brilho e esconde o retrabalho. Peça a medição, não a demonstração."
    },
    {
      pergunta: "Neste módulo, 'verificar' que a IA funciona significa:",
      alternativas: [
        "Perguntar ao fornecedor se ele confia no produto e reunir depoimentos dos clientes que ele já atende, tratando essa confiança como prova.",
        "Rodar a mesma demo mais algumas vezes e conferir se ela repete o bom resultado que impressionou na primeira apresentação.",
        "Escolher o modelo com a melhor nota no ranking público do momento e confiar que essa liderança se traduz no seu caso.",
        "Medir as respostas contra critérios de quem entende do assunto, de forma repetível — não no 'achei que ficou bom'."
      ],
      correta: 3,
      feedback: "Verificar é medição contra critério, não achismo. Exemplo: a OpenAI pôs 262 médicos para escrever critérios e um sistema pontua cada resposta. Critério, medida, repetível."
    },
    {
      pergunta: "Sobre o quanto os melhores modelos acertam numa tarefa realista difícil, o mais correto é:",
      alternativas: [
        "Mesmo o melhor modelo acerta só cerca de 60% numa tarefa realista difícil (na mais dura, perto de um terço); errar é o normal, e a operação precisa verificar.",
        "Os melhores modelos já acertam quase tudo nas tarefas realistas, e o pouco que ainda falham some com um bom ajuste de treino.",
        "Nessas tarefas o acerto até cai, mas só nos testes artificiais; no trabalho real, com bom contexto, o modelo quase não erra.",
        "O acerto baixo é coisa dos modelos mais baratos; quem paga pela versão de ponta leva um desempenho praticamente sem falhas."
      ],
      correta: 0,
      feedback: "No HealthBench, o melhor modelo acerta ~60% (na versão Hard, ~um terço). Errar é o normal. Por isso a pergunta não é 'a IA erra?' (erra), e sim 'você pega o erro antes ou depois do cliente ver?'."
    },
    {
      pergunta: "Um fornecedor diz que a IA dele 'aumenta a produtividade da equipe'. Qual a leitura mais cuidadosa do 'ganho'?",
      alternativas: [
        "Se um fornecedor sério afirma que aumenta, o ganho é real; questionar cada número só trava a decisão de compra.",
        "O ganho é a velocidade com que a IA produz o rascunho; quanto mais rápido ela entrega, maior o retorno para a equipe.",
        "O ganho real é a velocidade da IA menos o custo de revisar e corrigir o que ela faz; sem essa conta, pode ser só sensação.",
        "Produtividade com IA não se mede de verdade: como cada tarefa é diferente, qualquer número vira estimativa e não permite comparação honesta."
      ],
      correta: 2,
      feedback: "No estudo METR, o ganho bruto era comido pelo retrabalho — e os usuários não perceberam. Ganho real = velocidade menos verificação/correção. Sem linha de base medida, o 'aumento' pode ser imaginário."
    },
    {
      pergunta: "Por que importa perguntar se a operação de IA fica 'presa a um único modelo'?",
      alternativas: [
        "Porque o modelo mais novo costuma render mais, então o certo é migrar assim que ele sai, sem prender a operação a uma versão velha.",
        "Porque o modelo se renova a cada trimestre; amarrar a operação a um só é refazer tudo a cada troca — um portátil troca sem quebrar.",
        "Porque manter um único modelo concentra risco de segurança e obriga a passar por auditoria a cada renovação de contrato.",
        "Porque a questão do fornecedor único é só de preço: com um bom desconto por volume no contrato, a dependência de um só modelo deixa de importar."
      ],
      correta: 1,
      feedback: "Caso Shopify (M1): trocou o modelo sem quebrar a operação porque o valor estava no sistema em volta, não no modelo. Lock-in num modelo vira retrabalho a cada lançamento."
    },
    {
      pergunta: "O cliente sai deslumbrado de uma demo de IA e quer assinar na hora. Qual a melhor contribuição do sócio?",
      alternativas: [
        "Concordar e assinar na hora: a demo já mostrou o produto acertando, e esperar mais só faz o cliente perder o encantamento.",
        "Sugerir esperar o próximo modelo, que deve chegar em poucos meses mais preciso, antes de comprometer a operação com a versão de hoje.",
        "Pedir um bom desconto aproveitando o entusiasmo, para que o preço não vire o obstáculo lá na frente da negociação.",
        "Pedir para ver a medição, não a demonstração: 'como vocês medem que a IA acerta, e o que acontece no dia em que ela erra?'."
      ],
      correta: 3,
      feedback: "Demo impressiona; operação aguenta. A demo é ensaiada (só as perguntas que a IA acerta). Antes de assinar, peça o processo de medição e o tratamento de erro — as duas primeiras das 5 perguntas."
    },
    {
      pergunta: "Um fornecedor garante: 'nosso modelo praticamente não erra'. Como o sócio deve reagir?",
      alternativas: [
        "Tratar como alerta: até os melhores modelos erram em tarefas reais, e quem nega o erro não consegue pegá-lo antes do cliente ver.",
        "Ficar tranquilo e seguir com ele: um fornecedor que garante uma taxa de erro tão baixa está assumindo um compromisso sério de qualidade.",
        "Pedir que ele prove repetindo a mesma demonstração: se a IA acertar de novo nas mesmas perguntas, a garantia estaria confirmada.",
        "Trocar logo por um modelo ainda mais avançado, já que a versão de ponta praticamente elimina os erros que preocupam o cliente."
      ],
      correta: 0,
      feedback: "Errar é o estado normal (o melhor faz ~60% no HealthBench difícil). Um fornecedor que nega o erro é o mais perigoso — não tem monitoramento nem alçada humana para pegar a falha antes do cliente. Pergunte 'quando erra, o que acontece?'."
    },
    {
      pergunta: "O fornecedor promete '30% de aumento de produtividade'. Qual a melhor pergunta?",
      alternativas: [
        "'Consegue chegar a 40%?' — puxar por um número maior antes de fechar, para extrair o máximo que a proposta permitir.",
        "'Qual o preço por usuário?' — o custo mensal por pessoa conta, mas só depois de saber se o ganho de 30% é de verdade.",
        "'Qual é a linha de base e como isso foi medido?' — sem um antes-e-depois medido, o 30% pode ser a sensação de ganho que escondia uma perda.",
        "'Esse número vale no Brasil?' — a praça importa, mas antes é preciso saber se esse 30% foi mesmo medido lá fora."
      ],
      correta: 2,
      feedback: "METR: as pessoas sentiram ganho e mediram perda. Um número de produtividade sem linha de base é conversa. A pergunta certa expõe se há medição real ou só entusiasmo de demo."
    },
    {
      pergunta: "O fornecedor diz que a solução 'só funciona com o modelo X'. O que isso indica?",
      alternativas: [
        "Que o modelo X é o melhor do mercado hoje, e por isso a solução foi construída para extrair o máximo dele.",
        "Risco de lock-in: amarrada a um modelo, a operação tem de ser refeita a cada troca; vale perguntar se dá para trocar sem refazer tudo.",
        "Que a solução é mais segura, porque um modelo fixo e conhecido é mais fácil de auditar do que um sistema que troca de motor.",
        "Que não há problema algum: se a solução foi desenhada para o modelo X, ela vai funcionar de forma estável enquanto esse modelo existir."
      ],
      correta: 1,
      feedback: "O modelo é peça trocável e se renova a cada trimestre. Amarrar a operação a um só é refazer tudo a cada lançamento. Sistema portátil (caso Shopify) troca o modelo por baixo sem quebrar a operação. Pergunte pela portabilidade."
    },
    {
      pergunta: "Em uma frase: o que separa uma demo de uma operação?",
      alternativas: [
        "Um modelo de IA mais avançado, com mais parâmetros e treino recente, capaz de dar respostas melhores que as versões anteriores.",
        "Uma interface mais bonita e fácil de usar, que faz a equipe adotar a ferramenta e aproveitar melhor os recursos dela.",
        "Um contrato mais longo com o fornecedor, que garante suporte e atualizações e dá segurança jurídica para escalar o uso na empresa.",
        "A verificação: um processo que mede se a IA acertou e pega o erro antes do cliente; sem isso, é demonstração, não operação."
      ],
      correta: 3,
      feedback: "A resposta não é o modelo nem a demo: é a medição contínua e o tratamento de erro. (Saber se a IA funciona é uma coisa; saber se ela paga — o que custa e retorna — é o próximo módulo.)"
    }
  ]
};
/* ===== QUIZ_DATA_FIM ===== */

let atual = 0;
const resultados = [];

function iniciar(){
  document.getElementById("rotulo-modulo").textContent = QUIZ.modulo;
  document.getElementById("titulo-quiz").textContent = QUIZ.titulo;
  const regua = document.getElementById("regua");
  QUIZ.questoes.forEach((_, i) => {
    const p = document.createElement("div");
    p.className = "ponto"; p.id = "ponto-" + i; p.textContent = i + 1;
    regua.appendChild(p);
  });
  mostrarQuestao();
}

function mostrarQuestao(){
  const q = QUIZ.questoes[atual];
  document.getElementById("num-q").textContent =
    "Questão " + (atual + 1) + " de " + QUIZ.questoes.length;
  document.getElementById("texto-pergunta").textContent = q.pergunta;
  document.getElementById("ponto-" + atual).classList.add("atual");
  const cx = document.getElementById("alternativas");
  cx.innerHTML = "";
  q.alternativas.forEach((alt, i) => {
    const b = document.createElement("button");
    b.className = "alternativa"; b.textContent = alt;
    b.onclick = () => responder(i, b);
    cx.appendChild(b);
  });
  const fb = document.getElementById("feedback");
  fb.className = "feedback"; fb.innerHTML = "";
  document.getElementById("btn-proxima").classList.add("oculto");
}

function responder(escolha, botao){
  const q = QUIZ.questoes[atual];
  const acertou = escolha === q.correta;
  resultados.push(acertou);
  document.querySelectorAll(".alternativa").forEach((b, i) => {
    b.disabled = true;
    if (i === q.correta) b.classList.add("marcada-certa");
    else if (i === escolha && !acertou) b.classList.add("marcada-errada");
  });
  const ponto = document.getElementById("ponto-" + atual);
  ponto.classList.remove("atual");
  ponto.classList.add(acertou ? "certo" : "erro");
  ponto.textContent = acertou ? "✓" : "✗";
  const fb = document.getElementById("feedback");
  fb.className = "feedback " + (acertou ? "certo" : "erro");
  fb.innerHTML = "<strong>" + (acertou ? "Certo." : "Não é essa.") +
    "</strong>" + q.feedback;
  const btn = document.getElementById("btn-proxima");
  btn.textContent = atual < QUIZ.questoes.length - 1
    ? "Próxima questão" : "Ver resultado";
  btn.classList.remove("oculto");
  btn.focus();
}

function proxima(){
  atual++;
  if (atual < QUIZ.questoes.length) { mostrarQuestao(); return; }
  document.getElementById("cartao-questao").classList.add("oculto");
  const acertos = resultados.filter(Boolean).length;
  document.getElementById("nota-final").textContent =
    acertos + "/" + QUIZ.questoes.length;
  document.getElementById("glifos-final").textContent = glifos();
  document.getElementById("mensagem-final").textContent =
    acertos === QUIZ.questoes.length
      ? "Gabaritou. Poste no grupo e pressione os outros."
      : "O feedback das erradas volta na reunião. Poste seu resultado no grupo.";
  document.getElementById("cartao-final").classList.remove("oculto");
}

function glifos(){
  return resultados.map(r => r ? "✅" : "❌").join(" ");
}

function textoResultado(){
  const nome = document.getElementById("campo-nome").value.trim();
  const acertos = resultados.filter(Boolean).length;
  return "📊 Quiz " + QUIZ.modulo.replace(" · EXEMPLO","") +
    (nome ? " — " + nome : "") + ": " + acertos + "/" +
    QUIZ.questoes.length + "\n" + glifos();
}

function compartilharWhatsApp(){
  window.open("https://wa.me/?text=" +
    encodeURIComponent(textoResultado()), "_blank");
}

function copiarResultado(){
  navigator.clipboard.writeText(textoResultado()).then(() => {
    document.getElementById("aviso-copia").style.visibility = "visible";
  });
}

iniciar();
</script>
</body>
</html>
